<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工作指派單擴充功能</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .nav-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .nav-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        /* 浮動動畫 */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }
        
        .floating-icon {
            animation: float 6s ease-in-out infinite;
        }
    </style>
</head>
<body class="antialiased text-gray-800 selection:bg-orange-300 selection:text-white">

    <main class="w-full max-w-4xl glass-panel rounded-3xl p-10 md:p-16 relative overflow-hidden">
        
        <!-- 裝飾背景圈圈 -->
        <div class="absolute top-[-50px] right-[-50px] w-40 h-40 bg-orange-400 rounded-full mix-blend-multiply filter blur-2xl opacity-40"></div>
        <div class="absolute bottom-[-50px] left-[-50px] w-48 h-48 bg-yellow-400 rounded-full mix-blend-multiply filter blur-2xl opacity-40"></div>

        <div class="relative z-10 text-center mb-12">
            <div class="inline-flex items-center justify-center p-3 bg-gradient-to-br from-orange-400 to-red-500 rounded-2xl mb-6 shadow-lg floating-icon">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                </svg>
            </div>
            <h1 class="text-4xl md:text-5xl font-black tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-gray-800 to-gray-600 mb-4">
                工作指派單擴充功能
            </h1>
            <p class="text-lg text-gray-500 font-medium">請選擇您要使用的系統功能</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 relative z-10">
            
            <!-- 功能一：代辦商與檢查員交叉統計表 -->
            <a href="Dangerous_machinery_dealer.html" class="nav-card group block bg-white rounded-2xl p-8 border border-gray-100 h-full flex flex-col items-center text-center">
                <div class="h-16 w-16 bg-blue-50 text-blue-500 rounded-full flex items-center justify-center mb-6 group-hover:bg-blue-500 group-hover:text-white transition-colors duration-300">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                    </svg>
                </div>
                <h2 class="text-2xl font-bold text-gray-800 mb-3 group-hover:text-blue-600 transition-colors">代辦商與檢查員交叉統計表</h2>
                <p class="text-gray-500 text-sm leading-relaxed mb-6 flex-grow">
                    匯入工作指派單，快速進行代辦商與檢查員之間的案件數量交叉分析與統計。
                </p>
                <div class="mt-auto inline-flex items-center text-blue-500 font-bold text-sm group-hover:translate-x-2 transition-transform">
                    進入功能
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 ml-1" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" clip-rule="evenodd" />
                    </svg>
                </div>
            </a>

            <!-- 功能二：出差里程計算明細 -->
            <a href="Transportation_cost_calculation.html" class="nav-card group block bg-white rounded-2xl p-8 border border-gray-100 h-full flex flex-col items-center text-center">
                <div class="h-16 w-16 bg-green-50 text-green-500 rounded-full flex items-center justify-center mb-6 group-hover:bg-green-500 group-hover:text-white transition-colors duration-300">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7" />
                    </svg>
                </div>
                <h2 class="text-2xl font-bold text-gray-800 mb-3 group-hover:text-green-600 transition-colors">出差里程計算明細</h2>
                <p class="text-gray-500 text-sm leading-relaxed mb-6 flex-grow">
                    上傳行程表，自動串接圖資庫估算總里程、計算出差交通費用並顯示地圖路線。
                </p>
                <div class="mt-auto inline-flex items-center text-green-500 font-bold text-sm group-hover:translate-x-2 transition-transform">
                    進入功能
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 ml-1" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" clip-rule="evenodd" />
                    </svg>
                </div>
            </a>

        </div>
    </main>

</body>
</html>
